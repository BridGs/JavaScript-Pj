<!DOCTYPE html>
<html>
<head>
	<title>My JS Project</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>

	<h1>Create mission</h1>
	<input type="text" id="missionTitle" placeholder="Name of mission">
	<select type="text" id="difficulty">
		<option >Easy</option>
		<option >Normal</option>
		<option >Hard</option>
	</select>
	<select type="text" id="duration">
		<option >Short</option>
		<option >Normal</option>
		<option >Long</option>
	</select>
	<select type="text" id="enemyQuantity">
		<option >Low</option>
		<option >Normal</option>
		<option >Excesive</option>
	</select>
		<select type="text" id="enemyLevel">
		<option >Untrained</option>
		<option >Trained</option>
		<option >Veteran</option>
	</select>
	<input type="number" id="level" placeholder="Mission level">
	<button id="createMissionBtn">Create mission</button>

	<h1>Select mission</h1>
	<table>
		<thead>
			<tr>
				<th>title</th>
				<th>difficulty</th>
				<th>level</th>
				<th>action</th>
			</tr>
		</thead>
		<tbody id="missionTable">
		</tbody>
	</table>	
	<script src="script.JS"></script>
	
</body>
</html>
